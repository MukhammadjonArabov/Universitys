<aside class="sidebar card glass">
    <div class="sidebar-header">
        <div class="eyebrow"><i class="fas fa-filter"></i> Filtr</div>
        {% if active_region %}
            <span class="badge">Tanlangan: {{ active_region.name }}</span>
        {% endif %}
    </div>
    <ul class="filter-list">
        <li>
            <a class="{% if not selected_region_id %}active{% endif %}" href="?{% if search_query %}search={{ search_query }}{% endif %}">
                <i class="fas fa-globe"></i> Barcha viloyatlar
            </a>
        </li>
        {% for region in regions %}
            <li>
                <a class="{% if selected_region_id|default:'' == region.id|stringformat:'s' %}active{% endif %}"
                   href="?region={{ region.id }}{% if search_query %}&search={{ search_query }}{% endif %}">
                    <i class="fas fa-location-dot"></i> {{ region.name }}
                </a>
            </li>
        {% endfor %}
    </ul>
</aside>
